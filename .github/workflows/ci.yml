name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    name: Build, Format & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore AssetTrack.sln

      - name: Verify formatting
        run: dotnet format AssetTrack.sln --verify-no-changes

      - name: Build
        run: dotnet build AssetTrack.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test AssetTrack.sln --configuration Release --no-build --verbosity normal
