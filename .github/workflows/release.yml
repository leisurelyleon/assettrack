name: Release

on:
  push:
    tags: ["v*"]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-msi:
    name: Build Windows MSI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish self-contained app
        shell: pwsh
        run: |
          dotnet publish src/AssetTrack.App/AssetTrack.App.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output publish

      - name: Install WiX toolset
        shell: pwsh
        run: dotnet tool install --global wix --version 4.0.5

      - name: Build MSI
        shell: pwsh
        run: |
          dotnet build installer/AssetTrack.Installer/AssetTrack.Installer.wixproj `
            --configuration Release `
            -p:PublishDir="$env:GITHUB_WORKSPACE\publish"

      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Get-ChildItem -Recurse -Filter *.msi |
            Copy-Item -Destination dist

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v7
        with:
          name: assettrack-msi
          path: dist/*.msi
